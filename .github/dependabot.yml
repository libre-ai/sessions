version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
  - package-ecosystem: npm
    directory: "/e2e"
    schedule:
      interval: weekly
      day: tuesday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
