name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets --all-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Documentation
        run: cargo doc --workspace --all-features --no-deps
      - name: WASM portability (client crates)
        run: cargo check -p presto-core -p rumble-lm-ui --target wasm32-unknown-unknown

  guard:
    name: Repository guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: No machine-local home paths
        run: |
          if git grep -nIE '/Users/[a-z]|/home/[a-z]+/(dev|[.]claude)' -- . ; then
            echo "::error::machine-local path committed"; exit 1
          fi
      - name: No forbidden internal/proprietary reference
        run: |
          forbidden="dox""allia"
          if git grep -niE "$forbidden" -- . ; then
            echo "::error::forbidden internal/proprietary reference committed"; exit 1
          fi
      - name: No committed secret files
        run: |
          if git ls-files | grep -iE '[.](env|pem|key|p12)$' ; then
            echo "::error::secret file committed"; exit 1
          fi
      - name: No println!/eprintln! in server handlers (I2 observability gate)
        run: |
          # Handlers use tracing; startup banners (main.rs) and exempted CLI outputs (allow-println) are exempt.
          if grep -rn "println!\|eprintln!" crates/server/src --include='*.rs' | grep -v main.rs | grep -v "allow-println" ; then
            echo "::error::println!/eprintln! found in server code (use tracing instead; mark as 'allow-println' if intentional CLI output)"; exit 1
          fi

  integration:
    name: Integration + coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: presto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:presto@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c6d51ded7cde3c421f6cd6046cd601f2248f3710 # cargo-llvm-cov
      - name: Integration + coverage gate (real Postgres + Redis, >= 80%)
        run: >-
          cargo llvm-cov --workspace --ignore-filename-regex 'main\.rs'
          --fail-under-lines 80 -- --include-ignored --skip sustains_200_participants

  wrench-evidence:
    name: Wrench inspection evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: sessions
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: libre-ai/wrench
          path: wrench
          ref: cd430ba1a9dec4ccd85ac865a2ba1fbed58d8c03
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Both checkouts live in subdirectories; the cache probe must not
          # run cargo at the workspace root (no Cargo.toml there).
          workspaces: wrench/inspect
      - name: Build wrench-inspect
        run: cargo build --release --manifest-path wrench/inspect/Cargo.toml
      - name: Generate Portal evidence report
        run: |
          ./wrench/inspect/target/release/wrench-inspect portal inspect \
            sessions/crates/ui \
            --evidence > wrench-portal-evidence.json
      - name: Validate evidence report format
        run: |
          # Verify the report is valid JSON with the EvidenceReport v0.1 fields
          # (the report carries `status`, not `valid` — verified against the
          # real wrench-inspect output).
          jq -e '.format == "wrench.evidence_report.v0.1"' wrench-portal-evidence.json
          jq -e '.status == "passed" or .status == "failed"' wrench-portal-evidence.json
          jq -e '.checks | length > 0' wrench-portal-evidence.json
          echo "Evidence report is well-formed"
      - name: Gate on inspection passing
        run: |
          if ! jq -e '.status == "passed"' wrench-portal-evidence.json > /dev/null; then
            echo "::error::Portal inspection failed; see report below"
            jq . wrench-portal-evidence.json
            exit 1
          fi
      - name: Upload evidence report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wrench-portal-evidence
          path: wrench-portal-evidence.json

  artifact-manifest:
    name: Generate depot-conformant ArtifactManifest
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build presto-server release binary
        run: cargo build --bin presto-server --release
      - name: Generate ArtifactManifest
        env:
          ARTIFACT_VERSION: "0.0.0"
        run: |
          cargo run --bin emit-artifact-manifest -- \
            target/release/presto-server \
            --json-out artifact-manifest.json
      - name: Validate manifest against depot schema
        run: |
          # Verify the manifest is valid JSON with required gear-depot fields
          jq -e '.manifest_id != null and .manifest_id != ""' artifact-manifest.json
          jq -e '.artifact.artifact_id != null and .artifact.artifact_id != ""' artifact-manifest.json
          jq -e '.artifact.manifest_ref == .manifest_id' artifact-manifest.json
          jq -e '.checksums | length > 0' artifact-manifest.json
          jq -e '.checksums[] | select(.algorithm == "sha256").value | startswith("sha256:")' artifact-manifest.json
          jq -e '.provenance_id != null and .provenance_id != ""' artifact-manifest.json
          echo "✓ Manifest is valid and conforms to gear-depot schema"
      - name: Upload artifact manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: presto-server-artifact-manifest
          path: artifact-manifest.json

  bolt-handoff:
    name: Bolt planning-only handoff with evidence refs
    runs-on: ubuntu-latest
    needs: [rust, wrench-evidence]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: sessions
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: libre-ai/bolt
          path: bolt
          ref: f037784f01a62bf69a0e73e2cb7646e2c3d90acf
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bolt
      - name: Download Wrench evidence report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wrench-portal-evidence
          path: artifacts/
      - name: Build bolt-cosmatic CLI
        run: cargo build --release --manifest-path bolt/Cargo.toml --bin bolt-cosmatic
      - name: Execute dry-run plan with evidence refs
        run: |
          ./bolt/target/release/bolt-cosmatic handoff plan \
            sessions/docs/handoff/lm-slice-handoff.json \
            --dry-run --json \
            --evidence-report artifacts/wrench-portal-evidence.json \
            > bolt-handoff-dry-run.json
      - name: Validate dry-run output
        run: |
          # Verify the dry-run produced a valid plan with gates and tasks
          jq -e '.report.format' bolt-handoff-dry-run.json
          jq -e '.gates | length >= 0' bolt-handoff-dry-run.json
          jq -e '.tasks | length > 0' bolt-handoff-dry-run.json
          echo "✓ Dry-run plan is well-formed"
      - name: Display plan summary
        if: always()
        run: |
          echo "=== Bolt Handoff Dry-Run Plan ==="
          jq '.report | {format, kind, handoff_id, findings}' bolt-handoff-dry-run.json
          jq '.gates[] | {code, status, detail}' bolt-handoff-dry-run.json
          echo "=== Next Actions ==="
          jq '.next_actions[]' bolt-handoff-dry-run.json
      - name: Upload handoff dry-run result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bolt-handoff-dry-run
          path: bolt-handoff-dry-run.json
      - name: Gate on handoff validity
        run: |
          validity=$(jq -r '.report | if (.findings | map(select(.severity == "error")) | length) == 0 then "valid" else "invalid" end' bolt-handoff-dry-run.json)
          if [ "$validity" = "invalid" ]; then
            echo "::error::Bolt handoff has validation errors"
            jq '.report.findings[] | select(.severity == "error")' bolt-handoff-dry-run.json
            exit 1
          fi
          echo "✓ Handoff passed validation; safe for planning"

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    needs: [rust, integration]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: presto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:presto@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/
      # presto-server defaults to 8080; Playwright's webServer waits on :3000.
      PORT: "3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build server
        run: cargo build --bin presto-server --release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '18'
      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps
      - name: Run e2e tests
        run: |
          cd e2e
          npm test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
