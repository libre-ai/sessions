[workspace]
resolver = "3"
members = ["crates/core", "crates/server"]

[workspace.package]
edition = "2024"
rust-version = "1.95"
license = "MIT"
repository = "https://github.com/constantin-jais/Presto-Matic"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
presto-core = { path = "crates/core" }

[profile.release]
strip = true
lto = "thin"
