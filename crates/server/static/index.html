<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presto-Matic</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        margin-bottom: 1.5rem;
      }
      section {
        margin: 1rem 0;
      }
      button {
        font-size: 1rem;
        padding: 0.5rem 1rem;
        margin: 0.25rem 0.25rem 0.25rem 0;
        cursor: pointer;
      }
      input {
        font-size: 1rem;
        padding: 0.4rem;
      }
      #choices button {
        display: block;
        width: 100%;
        text-align: left;
      }
      #log {
        background: rgba(127, 127, 127, 0.1);
        padding: 0.5rem;
        font-size: 0.8rem;
        white-space: pre-wrap;
      }
      .code {
        font-size: 1.4rem;
        letter-spacing: 0.1em;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Presto-Matic</h1>

    <section id="landing" hidden>
      <button id="create">Créer une session (host)</button>
    </section>

    <section id="join" hidden>
      <p>Session <span class="code" id="join-code"></span></p>
      <input id="name" placeholder="Ton nom" maxlength="24" />
      <button id="do-join">Rejoindre</button>
    </section>

    <section id="host" hidden>
      <p>Code : <span class="code" id="code"></span></p>
      <p>Lien participant : <a id="joinlink"></a></p>
      <input id="query" placeholder="Sujet de la question" value="general" />
      <button id="generate">Ouvrir une question</button>
      <button id="reveal">Révéler</button>
      <p id="hoststatus"></p>

      <details id="ingest">
        <summary>Ingérer un document (corpus RAG)</summary>
        <input id="doc-id" placeholder="ID du document" value="doc1" />
        <textarea
          id="doc-text"
          placeholder="Colle ton texte ou markdown ici"
          rows="5"
          style="width: 100%; box-sizing: border-box"
        ></textarea>
        <button id="do-ingest">Ingérer</button>
        <p id="ingest-status"></p>
      </details>
    </section>

    <section id="play" hidden>
      <p id="question" class="code"></p>
      <div id="choices"></div>
    </section>

    <section id="leaderboard" hidden>
      <h2>Classement</h2>
      <ol id="board"></ol>
      <div id="heatmap"></div>
    </section>

    <section id="breakout" hidden>
      <h2>Clarification</h2>
      <p class="code" id="breakout-section"></p>
      <p id="breakout-text"></p>
    </section>

    <section id="flashcards" hidden>
      <h2>Révision espacée</h2>
      <button id="get-flashcards">Générer mes flashcards</button>
      <ol id="deck"></ol>
    </section>

    <pre id="log"></pre>
    <script src="/app.js"></script>
  </body>
</html>
